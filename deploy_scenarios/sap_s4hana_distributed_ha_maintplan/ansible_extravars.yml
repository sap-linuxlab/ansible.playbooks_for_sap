---
#### Infrastructure Provisioning selection ####
# Type of infrastructure provisioning method to use (String).
# Options: ansible, ansible_to_terraform, existing_hosts
sap_vm_provision_iac_type: "ENTER_STRING_VALUE_HERE"

# Infrastructure platform for provisioning (String).
# Options: aws_ec2_vs, gcp_ce_vm, ibmcloud_vs, ibmcloud_powervs, msazure_vm, ibmpowervm_vm, kubevirt_vm, ovirt_vm, vmware_vm
sap_vm_provision_iac_platform: "ENTER_STRING_VALUE_HERE"

# Name of the host specification plan to use (String).
# Options: Defined in host_specifications_dictionary.
sap_vm_provision_host_specification_plan: "ENTER_STRING_VALUE_HERE"


#### Key SAP System variables ####
sap_system_sid: "S01"  # SAP System ID (SID) (String)
sap_system_hana_db_sid: "H01"  # SAP HANA Database ID (SID) (String).
sap_system_hana_db_instance_nr: "90"  # SAP HANA Database instance number (String).
sap_system_nwas_abap_ascs_instance_nr: "00"  # SAP NetWeaver ABAP ASCS instance number (String).
sap_system_nwas_abap_ers_instance_nr: "10"  # SAP NetWeaver ABAP ERS instance number (String).
sap_system_nwas_abap_pas_instance_nr: "01"  # SAP NetWeaver ABAP PAS instance number (String).
sap_system_nwas_abap_aas_instance_nr: "11"  # SAP NetWeaver ABAP AAS instance number (String).

## SAP Product selection ##
# Name of the SAP product to install (String).
# Options: Defined in sap_software_install_dictionary (e.g. sap_s4hana_2025_distributed).
sap_software_product: "ENTER_STRING_VALUE_HERE"


#### SAP Software installation media downloads ####
## Required for download using community.sap_launchpad
# SAP ONE Support Launchpad credentials
sap_id_user: "ENTER_STRING_VALUE_HERE"  # Your SAP S-user ID (String).
sap_id_user_password: ''  # Your SAP S-user password (String).

# Directory with SAP installation media (e.g. /software) (String)
sap_install_media_detect_source_directory: "ENTER_STRING_VALUE_HERE"

# SAP Maintenance Planner transaction name
sap_maintenance_planner_transaction_name: 'ENTER_STRING_VALUE_HERE'


#### Preconfigure OS for SAP Software ####
sap_general_preconfigure_modify_etc_hosts: false  # Whether to modify /etc/hosts file (Boolean).
sap_general_preconfigure_reboot_ok: true  # Whether it's okay to reboot the system (Boolean).
sap_general_preconfigure_fail_if_reboot_required: false  # Whether to fail if a reboot is required (Boolean).
sap_hana_preconfigure_reboot_ok: true  # SAP HANA hosts will reboot twice if sap_general_preconfigure_reboot_ok is true (Boolean).
sap_hana_preconfigure_fail_if_reboot_required: false  # Whether to fail if a reboot is required (Boolean).
sap_hana_preconfigure_update: true  # Whether to update the system during pre-configuration (Boolean).
sap_hana_preconfigure_saptune_solution: 'S4HANA-DBSERVER'  # SUSE saptune solution to apply for SAP HANA (String).
sap_netweaver_preconfigure_fail_if_not_enough_swap_space_configured: false  # Whether to fail if not enough swap space is configured (Boolean).
sap_netweaver_preconfigure_reboot_ok: true  # SAP Netweaver hosts will reboot twice if sap_general_preconfigure_reboot_ok is true (Boolean).
sap_netweaver_preconfigure_fail_if_reboot_required: false  # Whether to fail if a reboot is required (Boolean).
sap_netweaver_preconfigure_update: true  # Whether to update the system during pre-configuration (Boolean).
sap_netweaver_preconfigure_saptune_solution: 'S4HANA-APPSERVER'  # SUSE saptune solution to apply for SAP NetWeaver (String).


#### SAP HANA Database Server installation ####
# IMPORTANT: All SAP passwords must be replaced with complex and secure values per SAP best practices.
# Do NOT leave placeholder values or empty strings.

# SAP HANA Master password
sap_hana_install_use_master_password: "y"  # Use a master password for SAP HANA installation (y/n) (String).
sap_hana_install_master_password: ''  # The master password for SAP HANA (String).

# Dynamic assignment of SAP HANA variables
sap_hana_sid: "{{ sap_system_hana_db_sid }}"
sap_hana_install_instance_nr: "{{ sap_system_hana_db_instance_nr }}"

#### SAP HANA Database Server installation - Optional variables ####
## SAP HANA log mode (set to overwrite for Sandbox only, HA cannot use overwrite) (String)
# sap_hana_install_log_mode: overwrite  # Options: normal, overwrite.

## List of comma separated components to be installed, default 'all'
# sap_hana_install_components: 'all'  # Comma-separated list of SAP HANA components to install (String).

## Unix User ID. Leave this blank if you want this set automatically by hdblcm
## For production systems, it's highly advisable to set this manually according to your environment's Unix ID policies
# sap_hana_install_userid:  # Unix User ID for SAP HANA (String).
# sap_hana_install_groupid:  # Unix Group ID for SAP HANA (String).

# sap_hana_install_system_usage: custom  # hdblcm parameter system_usage (String).
# sap_hana_install_restrict_max_mem: 'n'  # hdblcm parameter restrict_max_mem (y/n) (String).
# sap_hana_install_max_mem:  # hdblcm parameter max_mem in MB required when sap_hana_install_restrict_max_mem is y (String).
# sap_hana_install_system_restart: 'n'  # select if role should start SAP HANA after each system boot (y/n) (String).
## Pass some extra arguments to the hdblcm cli, e.g.  --ignore=<check1>[,<check2>]...
# sap_hana_install_hdblcm_extraargs:   # Extra arguments for hdblcm (String).


#### SAP SWPM Installation ####
# IMPORTANT: All SAP passwords must be replaced with complex and secure values per SAP best practices.
# Do NOT leave placeholder values or empty strings.

sap_swpm_install_saphostagent: true  # Whether to install SAP Host Agent during SWPM installation (String).

sap_swpm_master_password: ''  # Master password for the SAP system (String).
sap_swpm_ddic_000_password: '' # Password for the DDIC user in client 000 (String).

sap_swpm_db_schema_abap: "SAPHANADB"  # Name of the ABAP schema in the SAP HANA database (String).

sap_swpm_db_schema_abap_password: ''  # Password for the ABAP schema user (String).
sap_swpm_db_sidadm_password: ''  # Password for the <sid>adm user in the database (String).
sap_swpm_db_system_password: ''  # Password for the SYSTEM user in the SAP HANA database (String).
sap_swpm_db_systemdb_password: ''  # Password for the SYSTEM user in the SAP HANA system database (String).

# Dynamic assignment of SAP SWPM variables
sap_swpm_sid: "{{ sap_system_sid }}"
sap_swpm_ascs_instance_nr: "{{ sap_system_nwas_abap_ascs_instance_nr }}"
sap_swpm_ers_instance_nr: "{{ sap_system_nwas_abap_ers_instance_nr }}"
sap_swpm_pas_instance_nr: "{{ sap_system_nwas_abap_pas_instance_nr }}"
sap_swpm_aas_instance_nr: "{{ sap_system_nwas_abap_aas_instance_nr }}"
sap_swpm_db_sid: "{{ sap_system_hana_db_sid }}"
sap_swpm_db_instance_nr: "{{ sap_system_hana_db_instance_nr }}"
sap_swpm_templates_install_dictionary: "{{ sap_software_install_dictionary[sap_software_product] }}"  # Distributed
sap_swpm_fqdn: "{{ ansible_facts['domain'] }}"

#### SAP SWPM Installation - Optional variables ####
## Unix User ID
sap_swpm_sapadm_uid: '3000'  # Unix User ID for the sapadm user (String).
sap_swpm_sapsys_gid: '3001'  # Unix Group ID for the sapsys group (String).
sap_swpm_sidadm_uid: '3001'  # Unix User ID for the <sid>adm user (String).

sap_swpm_update_etchosts: false  # Whether to update the /etc/hosts file during SWPM installation (String).


#### High Availability variables ####
## Virtual host names
# See virtual hostname information in SAP Note 2279110 and 962955
# Ensure this does not contain the local hostname, must use the Virtual Hostname for use with the Virtual IP (VIP)
# sap_swpm_virtual_hostname: "{{ hostvars[inventory_hostname].groups.nwas_ascs[0] }}-ha"
sap_swpm_ascs_instance_hostname: "{{ hostvars[inventory_hostname].groups.nwas_ascs[0] }}-ha"
sap_swpm_ers_instance_hostname: "{{ hostvars[inventory_hostname].groups.nwas_ers[0] }}-ha"
sap_swpm_db_host: "{{ hostvars[inventory_hostname].groups.hana_primary[0] }}-ha" # Must be SAP HANA Virtual Hostname

# However we are not using the PAS or AAS in a High Availability setup, only the Database and ASCS/ERS are.
# Therefore, override the virtual hostname with the local hostname.
sap_swpm_pas_instance_hostname: "{{ hostvars[inventory_hostname].groups.nwas_pas[0] }}"
sap_swpm_aas_instance_hostname: "{{ hostvars[inventory_hostname].groups.nwas_aas[0] }}"

## Infrastructure Platform - High Availability Virtual IPs (VIPs)
# AWS:                  the VIP must be **outside** of any VPC Subnet ranges (e.g. 192.168.100.102/32)
# GCP:                  the VIP must be within the VPC Subnetwork range attached to GCP Backend Service
#                       for the Internal passthrough Network Load Balancer (e.g. 10.10.10.10/32)
# IBM Cloud:            the VIP is within the VPC Subnet range and is statically defined
#                       by the IBM Cloud Load Balancer [NLB L4 or ALB L7], variable should be commented out
# IBM Cloud, Power VS:  the VIP must be within the IBM Power Infrastructure VLAN Subnet range (e.g. 192.168.4.4/26)
# MS Azure:             the VIP must be within the VNet Subnet range attached to the Azure Load Balancer [NLB L4] (e.g. 10.10.10.10/22)
# IBM PowerVM:          the VIP must be within the VLAN Subnet range
# OVirt KVM:            the VIP must be within the VLAN Subnet range
# KubeVirt:             the VIP must be within the VLAN Subnet range
sap_vm_provision_ha_vip_hana_primary: "ENTER_STRING_VALUE_HERE"
sap_vm_provision_ha_vip_nwas_abap_ascs: "ENTER_STRING_VALUE_HERE"
sap_vm_provision_ha_vip_nwas_abap_ers: "ENTER_STRING_VALUE_HERE"
sap_ha_pacemaker_cluster_vip_nwas_abap_ascs_ip_address: "{{ sap_vm_provision_ha_vip_nwas_abap_ascs }}"
sap_ha_pacemaker_cluster_vip_nwas_abap_ers_ip_address: "{{ sap_vm_provision_ha_vip_nwas_abap_ers }}"

# Variables for Ansible Role sap_ha_pacemaker_cluster
# ASCS/ERS Pacemaker Cluster
sap_system_ascs_ers_cluster_name: 'clusterascs'  # Pacemaker cluster name (String).
sap_system_ascs_ers_hacluster_user_password: 'clusterpass'  # Pacemaker cluster 'hacluster' user password (String).

# HANA HA Pacemaker Cluster
sap_system_hana_cluster_name: 'clusterhdb'  # Pacemaker cluster name (String).
sap_system_hana_hacluster_user_password: 'clusterpass'  # Pacemaker cluster 'hacluster' user password (String).


## SAP HANA System Replication (HSR) installation
sap_ha_install_hana_hsr_sid: "{{ sap_system_hana_db_sid }}"
sap_ha_install_hana_hsr_instance_number: "{{ sap_system_hana_db_instance_nr }}"
sap_ha_install_hana_hsr_db_system_password: "{{ sap_hana_install_master_password }}"


#### Shared Ansible Facts ####
sap_hostname: "{{ ansible_facts['hostname'] }}"
sap_domain: "{{ ansible_facts['domain'] }}"
sap_ip: "{{ ansible_facts['default_ipv4'].address }}"


#### Ansible dictionary for SAP Installation Media ####
sap_software_install_dictionary:

  sap_s4hana_2025_distributed:

    # List of product specific software files that are architecture independent.
    # Independent files are not used, because download uses Maintenance Plan.
    sap_software_list_independent: []

    # List of product specific software files that are architecture dependent - Linux on x86_64 64bit.
    # SAP SWPM may not be included in the Maintenance Planner stack generated, please check and if not included then append to list
    sap_software_list_x86_64:
      - 'SAPCAR_1400-70007716.EXE'

    # List of product specific software files that are architecture dependent - Linux on Power LE 64bit.
    sap_software_list_ppc64le:
      - 'SAPCAR_1400-70007726.EXE'

    # This list assigned from shared dictionary, because it is same with other products or host types.
    sap_software_files_hana_wildcard_list: "{{ sap_playbook_software_wildcards['hana'] }}"

    nwas_ascs_ha:

      # SWPM product catalog ID for the installation (String).
      sap_swpm_product_catalog_id: NW_ABAP_ASCS:S4HANA2025.CORE.HDB.ABAPHA

      # List of INI file sections to generate using sap_install.sap_swpm role (List).
      # This list assigned from shared dictionary, because it is same with other products or host types.
      sap_swpm_inifile_sections_list: "{{ sap_playbook_swpm_inifile_sections['ascs_pas'] }}"

      sap_swpm_inifile_dictionary:
        # SAP SWPM using SAP Maintenance Planner Stack XML
        # sap_swpm_mp_stack_path: "" # This triggers search of MP Stack XML and alters SAP SWPM execution, use sap_install_media_detect to identify instead
        sap_swpm_configure_tms: true
        sap_swpm_tmsadm_password: ''
        sap_swpm_spam_update: false
        sap_swpm_sum_prepare: true
        sap_swpm_sum_start: true

      # List of file name patterns relevant to host type.
      # This list assigned from shared dictionary, because it is same with other products or host types.
      sap_software_files_wildcard_list: "{{ sap_playbook_software_wildcards['netweaver'] }}"

    nwas_ers_ha:

      # Product ID for New Installation
      sap_swpm_product_catalog_id: NW_ERS:S4HANA2025.CORE.HDB.ABAPHA

      # List of INI file sections to generate using sap_install.sap_swpm role (List).
      # This list assigned from shared dictionary, because it is same with other products or host types.
      sap_swpm_inifile_sections_list: "{{ sap_playbook_swpm_inifile_sections['ers'] }}"

