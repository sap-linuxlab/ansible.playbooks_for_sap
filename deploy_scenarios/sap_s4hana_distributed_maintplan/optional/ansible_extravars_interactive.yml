#### Ansible Dictionary for host specifications ####
sap_vm_provision_ibmcloud_powervs_host_specifications_dictionary:

  xsmall_256gb:

    hana01: # Hostname, must be 13 characters or less
      sap_host_type: hana_primary # hana_primary, hana_secondary, nwas_ascs, nwas_ers, nwas_pas, nwas_aas
      # 32 vCPU x 256GB DRAM, alt: use custom SAP instance profile sizes using cnp-2x16 (2 Power Cores [16 vCPU] x 16GB) and above
      virtual_machine_profile: "ush1-4x256"
      ibmcloud_powervs_hardware_machine_type: e980 # IBM Power hardware machine type (MT) used to host the Virtual Machine
      disable_ip_anti_spoofing: true

      sap_storage_setup_sid: "{{ sap_system_hana_db_sid }}"

      # hana_primary, hana_secondary, nwas_abap_ascs, nwas_abap_ers, nwas_abap_pas, nwas_abap_aas, nwas_java_scs, nwas_java_ers
      sap_storage_setup_host_type:
        - hana_primary

      storage_definition:

      # Commented out variables are the same for each filesystem, only shown once below to ease readability
        - name: hana_data
          mountpoint: /hana/data
          disk_count: 1                  # default: 1, if more then then LVM logical volume will be striped across the defined disks
          disk_size: 384                 # size in GB, integer
          disk_type: tier1
          filesystem_type: xfs           # default: xfs
          # lvm_lv_name:                  # default: lv_<element_name>
          # lvm_lv_stripes: 2             # default: null, number of disks to stripe over
          # lvm_lv_stripe_size: 128K      # default: 64K, defined by the OS. Akin to Virtualized Block Size
          # lvm_vg_name:                  # default: vg_<element name>
          # lvm_vg_options:               # default: none, additional LVM VG options as string in LVM options syntax
          #                               # (e.g. "--dataalignment XX ..." to override MiB offset from disk start before first LVM VG Physical Extent)
          # lvm_vg_physical_extent_size:  # default: 4, uses 4 MiB default and difficult to change once set. Akin to Physical Block Size
          # lvm_pv_device:                # default: discovered ansible_facts['devices'] matching the target size
          # lvm_pv_options:               # default: none, additional LVM PV options as string in LVM options syntax
          #                               # (e.g. "--dataalignment XX ..." to override MiB offset from disk start before first LVM PV Physical Extent)
          # nfs_path:                     # subdirectory path on the NFS server
          # nfs_server:                   # NFS server and parent directory (e.g. nfs.com:/share1). default: {{ sap_storage_setup_nfs_server }}
          # nfs_filesystem_type:          # default: {{ sap_storage_setup_nfs_filesystem_type }}
          # nfs_mount_options:            # default: {{ sap_storage_setup_nfs_mount_options }}

        - name: hana_log
          mountpoint: /hana/log
          disk_count: 1
          disk_size: 144                 # size in GB, integer
          disk_type: tier1
          filesystem_type: xfs           # default: xfs

        - name: hana_shared
          mountpoint: /hana/shared
          disk_size: 256
          # Does NOT use Burst IOPS storage. Approx same cost as 1TB at lower IOPS Tiers, use lower capacity and increase to 10IOPS/GB
          # to ensure quicker DB Backup Restore from /hana/shared/<system_id>/HDB<instance_no>/backup/data/DB_<suffix>
          disk_type: tier1
          filesystem_type: xfs           # default: xfs

        # See SAP Note 1597355 - Swap-space recommendation for Linux
        - name: swap # hdb
          swap_path: /swapfile           # use swap file on root disk, instead of creating LVM LV for swap
          disk_size: 2
          disk_type: tier1
          filesystem_type: swap          # must be swap filesystem

        - name: software
          mountpoint: /software
          disk_size: 100                 # size in GB, integer
          disk_type: tier1
          filesystem_type: xfs           # default: xfs

    nwas-ascs: # Hostname, must be 13 characters or less
      sap_host_type: nwas_ascs # hana_primary, hana_secondary, nwas_ascs, nwas_ers, nwas_pas, nwas_aas
      # 16 vCPU x 32GB DRAM, alt: use custom SAP instance profile sizes using cnp-2x16 (2 Power Cores [16 vCPU] x 16GB) and above
      virtual_machine_profile: "cnp-2x32"
      ibmcloud_powervs_hardware_machine_type: e980 # IBM Power hardware machine type (MT) used to host the Virtual Machine
      disable_ip_anti_spoofing: true

      sap_storage_setup_sid: "{{ sap_system_sid }}"
      sap_storage_setup_nwas_abap_ascs_instance_nr: "{{ sap_system_nwas_abap_ascs_instance_nr }}"

      # hana_primary, hana_secondary, nwas_abap_ascs, nwas_abap_ers, nwas_abap_pas, nwas_abap_aas, nwas_java_scs, nwas_java_ers
      sap_storage_setup_host_type:
        - nwas_abap_ascs

      storage_definition:

        - name: usr_sap
          mountpoint: /usr/sap
          nfs_path: /usr/sap                                              # subdirectory path on the NFS server
          # NFS server and parent directory (e.g. nfs.com:/share1). default: {{ sap_storage_setup_nfs_server }}
          nfs_server: "{{ sap_vm_provision_nfs_mount_point | d('') }}"
          nfs_filesystem_type: "{{ sap_vm_provision_nfs_mount_point_type | d('') }}" # default: {{ sap_storage_setup_nfs_filesystem_type }}
          nfs_mount_options: "{{ sap_vm_provision_nfs_mount_point_opts | d('') }}"   # default: {{ sap_storage_setup_nfs_mount_options }}

        - name: usr_sap_trans
          mountpoint: /usr/sap/trans
          nfs_path: /usr/sap/trans                                                       # subdirectory path on the NFS server
          # NFS server and parent directory (e.g. nfs.com:/share1). default: {{ sap_storage_setup_nfs_server }}
          nfs_server: "{{ sap_vm_provision_nfs_mount_point_separate_sap_transport_dir | d('') }}"
          nfs_filesystem_type: "{{ sap_vm_provision_nfs_mount_point_type | d('') }}"                # default: {{ sap_storage_setup_nfs_filesystem_type }}
          nfs_mount_options: "{{ sap_vm_provision_nfs_mount_point_opts | d('') }}"                  # default: {{ sap_storage_setup_nfs_mount_options }}

        - name: sapmnt
          mountpoint: /sapmnt
          nfs_path: /sapmnt                                               # subdirectory path on the NFS server
          # NFS server and parent directory (e.g. nfs.com:/share1). default: {{ sap_storage_setup_nfs_server }}
          nfs_server: "{{ sap_vm_provision_nfs_mount_point | d('') }}"
          nfs_filesystem_type: "{{ sap_vm_provision_nfs_mount_point_type | d('') }}" # default: {{ sap_storage_setup_nfs_filesystem_type }}
          nfs_mount_options: "{{ sap_vm_provision_nfs_mount_point_opts | d('') }}"   # default: {{ sap_storage_setup_nfs_mount_options }}

        # See SAP Note 1597355 - Swap-space recommendation for Linux
        - name: swap # nwas
          disk_size: 64
          disk_type: tier3               # Does NOT use Burst IOPS storage
          filesystem_type: swap          # must be swap filesystem

        - name: software
          mountpoint: /software
          disk_size: 100                 # size in GB, integer
