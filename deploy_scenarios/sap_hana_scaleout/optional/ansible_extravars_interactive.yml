---
#### Instructions for Interactive Prompts ####
# This file defines the essential set of variables required for initial interactive execution.
# All other required variables will be dynamically gathered through interactive prompts.
# Pre-defining a variable in this file will skip the associated interactive prompt.


# SAP HANA Scale-Out variables for role sap_vm_provision
sap_vm_provision_calculate_sap_hana_scaleout_active_coordinator: 1  # Number of active coordinators (Integer).
sap_vm_provision_calculate_sap_hana_scaleout_active_worker: 2  # Number of active workers (Integer).
sap_vm_provision_calculate_sap_hana_scaleout_standby: 1  # Number of standby nodes. Options: 0, 1 (Integer).

#### Preconfigure OS for SAP Software ####
sap_general_preconfigure_modify_etc_hosts: false  # Whether to modify /etc/hosts file (Boolean).
sap_general_preconfigure_reboot_ok: true  # Whether it's okay to reboot the system (Boolean).
sap_general_preconfigure_fail_if_reboot_required: false  # Whether to fail if a reboot is required (Boolean).
sap_hana_preconfigure_reboot_ok: true  # SAP HANA hosts will reboot twice if sap_general_preconfigure_reboot_ok is true (Boolean).
sap_hana_preconfigure_fail_if_reboot_required: false  # Whether to fail if a reboot is required (Boolean).
sap_hana_preconfigure_update: true  # Whether to update the system during pre-configuration (Boolean).
sap_hana_preconfigure_saptune_solution: 'HANA'  # SUSE saptune solution to apply for SAP HANA (String).


#### Shared Ansible Facts ####
sap_hostname: "{{ ansible_facts['hostname'] }}"
sap_domain: "{{ ansible_facts['domain'] }}"
sap_ip: "{{ ansible_facts['default_ipv4'].address }}"


#### Ansible dictionary for SAP Installation Media ####
sap_software_install_dictionary:

  sap_hana_2_sps08_install:

    # List of product specific software files that are architecture independent.
    sap_software_list_independent: []

    # List of product specific software files that are architecture dependent - Linux on x86_64 64bit.
    sap_software_list_x86_64:
      # Database Server
      - 'IMDB_SERVER20_089_1-80002031.SAR'  # Revision 2.00.089.1 (SPS08) for HANA DB 2.0
      - 'IMDB_CLIENT20_028_17-80002082.SAR'  # SAP HANA CLIENT Version 2.28
      # Application Server
      - 'SAPHOSTAGENT67_67-80004822.SAR'  # SAP Host Agent 7.22
      # Tools
      - 'SAPCAR_1300-70007716.EXE'

    # List of product specific software files that are architecture dependent - Linux on Power LE 64bit.
    sap_software_list_ppc64le:
      # Database Server
      - 'IMDB_SERVER20_089_1-80002046.SAR'  # Revision 2.00.089.1 (SPS08) for HANA DB 2.0
      - 'IMDB_CLIENT20_028_17-80002095.SAR'  # SAP HANA CLIENT Version 2.28
      # Application Server
      - 'SAPHOSTAGENT67_67-80004831.SAR'  # SAP Host Agent 7.22
      # Tools
      - 'SAPCAR_1300-70007726.EXE'


  sap_hana_2_sps07_install:
    # For detailed comments on each defined parameter, see first product in 'sap_software_install_dictionary'.

    sap_software_list_independent: []

    sap_software_list_x86_64:
      # Database Server
      - 'IMDB_SERVER20_079_8-80002031.SAR'  # Revision 2.00.079.8 (SPS07) for HANA DB 2.0
      - 'IMDB_CLIENT20_028_17-80002082.SAR'  # SAP HANA CLIENT Version 2.28
      # Application Server
      - 'SAPHOSTAGENT67_67-80004822.SAR'  # SAP Host Agent 7.22
      # Tools
      - 'SAPCAR_1300-70007716.EXE'

    sap_software_list_ppc64le:
      # Database Server
      - 'IMDB_SERVER20_079_8-80002046.SAR'  # Revision 2.00.079.8 (SPS07) for HANA DB 2.0
      - 'IMDB_CLIENT20_028_17-80002095.SAR'  # SAP HANA CLIENT Version 2.28
      # Application Server
      - 'SAPHOSTAGENT67_67-80004831.SAR'  # SAP Host Agent 7.22
      # Tools
      - 'SAPCAR_1300-70007726.EXE'


  sap_hana_2_sps06_install:
    # For detailed comments on each defined parameter, see first product in 'sap_software_install_dictionary'.

    sap_software_list_independent: []

    sap_software_list_x86_64:
      # Database Server
      - 'IMDB_SERVER20_067_4-80002031.SAR'
      # Application Server
      - 'SAPHOSTAGENT61_61-80004822.SAR' # SAP Host Agent 7.22
      # Tools
      - 'SAPCAR_1300-70007716.EXE'

    sap_software_list_ppc64le:
      # Database Server
      - 'IMDB_SERVER20_067_4-80002046.SAR'
      # Application Server
      - 'SAPHOSTAGENT61_61-80004831.SAR' # SAP Host Agent 7.22
      # Tools
      - 'SAPCAR_1300-70007726.EXE'


#### Interactive Prompt Control Variables ####
# Do not change these variables unless you intend to modify the interactive prompt behavior!
sap_playbook_interactive_product: hana
sap_playbook_interactive_database: hana
sap_playbook_interactive_layout: hana_scaleout


#### Ansible Dictionary for host specifications ####
sap_vm_provision_aws_ec2_vs_host_specifications_dictionary:

  xsmall_256gb:

    hdb-scaleout: # Hostname, must be 13 characters or less
      sap_host_type: hana_primary # hana_primary, hana_secondary, nwas_ascs, nwas_ers, nwas_pas, nwas_aas
      virtual_machine_profile: "r7i.8xlarge" # 32 vCPU x 256GB DRAM
      disable_ip_anti_spoofing: true

      sap_storage_setup_sid: "{{ sap_system_hana_db_sid }}"

      # hana_primary, hana_secondary, nwas_abap_ascs, nwas_abap_ers, nwas_abap_pas, nwas_abap_aas, nwas_java_scs, nwas_java_ers
      sap_storage_setup_host_type:
        - hana_primary

      storage_definition:

        - name: hana_data
          mountpoint: /hana/data
          nfs_path: /hana/data                                          # subdirectory path on the NFS server
          # NFS server and parent directory (e.g. nfs.com:/share1). default: {{ sap_storage_setup_nfs_server }}
          nfs_server: "{{ sap_vm_provision_nfs_mount_point_hana_data | d('') }}"
          nfs_filesystem_type: "{{ sap_vm_provision_nfs_mount_point_type | d('') }}" # default: {{ sap_storage_setup_nfs_filesystem_type }}
          nfs_mount_options: "{{ sap_vm_provision_nfs_mount_point_opts | d('') }}"   # default: {{ sap_storage_setup_nfs_mount_options }}

        - name: hana_log
          mountpoint: /hana/log
          nfs_path: /hana/log                                          # subdirectory path on the NFS server
          # NFS server and parent directory (e.g. nfs.com:/share1). default: {{ sap_storage_setup_nfs_server }}
          nfs_server: "{{ sap_vm_provision_nfs_mount_point_hana_log | d('') }}"
          nfs_filesystem_type: "{{ sap_vm_provision_nfs_mount_point_type | d('') }}" # default: {{ sap_storage_setup_nfs_filesystem_type }}
          nfs_mount_options: "{{ sap_vm_provision_nfs_mount_point_opts | d('') }}"   # default: {{ sap_storage_setup_nfs_mount_options }}

        - name: hana_shared
          mountpoint: /hana/shared
          nfs_path: /hana/shared                                          # subdirectory path on the NFS server
          # NFS server and parent directory (e.g. nfs.com:/share1). default: {{ sap_storage_setup_nfs_server }}
          nfs_server: "{{ sap_vm_provision_nfs_mount_point_hana_shared | d('') }}"
          nfs_filesystem_type: "{{ sap_vm_provision_nfs_mount_point_type | d('') }}" # default: {{ sap_storage_setup_nfs_filesystem_type }}
          nfs_mount_options: "{{ sap_vm_provision_nfs_mount_point_opts | d('') }}"   # default: {{ sap_storage_setup_nfs_mount_options }}

        # See SAP Note 1597355 - Swap-space recommendation for Linux
        - name: swap # hdb
          swap_path: /swapfile           # use swap file on root disk, instead of creating LVM LV for swap
          disk_size: 2
          filesystem_type: swap          # must be swap filesystem

        - name: software
          mountpoint: /software
          disk_size: 100                 # size in GB, integer
          filesystem_type: xfs           # default: xfs


